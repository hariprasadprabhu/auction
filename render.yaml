# Render.io Configuration for AuctionDeck API
# Deploy via Render Dashboard using this configuration
# IMPORTANT: Set sensitive variables through Render Dashboard, NOT in this file

services:
  - type: web
    name: auctiondeck-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon  # Change to your preferred region
    plan: standard  # starter or standard
    
    # Auto-deploy when you push to main branch
    autoDeploy: true
    
    # Environment variables
    # Note: Public variables only - sensitive variables set via dashboard
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: LOG_LEVEL
        value: INFO
      - key: JPA_SHOW_SQL
        value: false
    
    # REQUIRED: Set these in Render Dashboard (Environment tab)
    # - DB_URL: Connection string to your Postgres database
    #   Examples:
    #   - Render Postgres: postgresql://user:pass@db.render.com:5432/dbname
    #   - Neon: postgresql://user:pass@ep-xxxxx.region.neon.tech/dbname
    #   - Supabase: postgresql://user:pass@db.supabase.co:5432/postgres
    # - DB_USERNAME: Database user (usually postgres or your custom user)
    # - DB_PASSWORD: Database password (use strong password)
    # - JWT_SECRET: JWT signing secret (generate with: openssl rand -base64 32)
    # - CORS_ALLOWED_ORIGINS: Your frontend domain(s)
    
    # Service details
    buildCommand: null  # Docker handles the build
    startCommand: null  # CMD in Dockerfile handles startup
    
    # Health check (Render will use Docker HEALTHCHECK from Dockerfile)
    healthCheckPath: /api/health
    healthCheckInterval: 30
    
    # Resource limits
    maxInstanceCount: 1  # Set higher if you want auto-scaling (paid feature)

databases:
  - name: auctiondeck-db
    databaseName: auctiondeck
    user: postgres
    plan: starter  # starter or pro (managed PostgreSQL)
    ipAllowList: []  # Allow all IPs

