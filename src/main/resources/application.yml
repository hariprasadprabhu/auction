server:
  port: 8080

spring:
  application:
    name: auction

  datasource:
    url: jdbc:postgresql://localhost:5432/auctiondeck
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

app:
  jwt:
    secret: "YourSuperSecretKeyHereMustBeAtLeast256BitsLongForHmacSha256!!"
    expiration: 86400000

  cors:
    allowed-origins: "http://localhost:4200"

logging:
  level:
    com.bid.auction: DEBUG
    org.springframework.security: INFO

