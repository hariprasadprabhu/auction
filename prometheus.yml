# Prometheus Configuration for HikariCP Connection Pool Monitoring
#
# This configuration enables monitoring of HikariCP connection pool metrics
# through Spring Boot Actuator integration with Prometheus.
#
# Add this to your prometheus.yml configuration file
#

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'auction-app'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

# Load rules once and periodically evaluate them
rule_files:
  - "alert-rules.yml"

scrape_configs:
  # Auction Application - Development
  - job_name: 'auction-dev'
    metrics_path: '/api/actuator/prometheus'
    static_configs:
      - targets: ['localhost:8080']
    scrape_interval: 10s
    scrape_timeout: 5s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [__scheme__]
        target_label: scheme

  # Auction Application - Production
  - job_name: 'auction-prod'
    metrics_path: '/api/actuator/prometheus'
    static_configs:
      - targets: ['prod-server:8080']
    scrape_interval: 15s
    scrape_timeout: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [__scheme__]
        target_label: scheme

  # PostgreSQL Database (if exporting metrics)
  - job_name: 'postgres'
    static_configs:
      - targets: ['localhost:9187']
    scrape_interval: 30s

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

