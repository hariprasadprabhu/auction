server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
  compression:
    enabled: true
    min-response-size: 1024
  tomcat:
    max-threads: 200
    min-spare-threads: 10
    accept-count: 100

spring:
  application:
    name: auction

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/auctiondeck}}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Connection pool sizing for better resilience
      maximum-pool-size: 25
      minimum-idle: 8
      connection-timeout: 60000
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      leak-detection-threshold: 120000
      auto-commit: true
      validation-timeout: 5000
      connection-init-sql: SELECT 1
      # Additional resilience settings
      validation-interval: 30000
      cache-prep-stmts: true
      prep-stmt-cache-size: 250
      prep-stmt-cache-sql-limit: 2048

  jpa:
    hibernate:
      ddl-auto: ${JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: false
        jdbc:
          lob:
            non_contextual_creation: true
          batch_size: 20
          fetch_size: 50
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        connection:
          provider_disables_autocommit: false
        session:
          events:
            log: false
        query:
          in_clause_parameter_padding: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

app:
  jwt:
    secret: ${JWT_SECRET:YourSuperSecretKeyHereMustBeAtLeast256BitsLongForHmacSha256!!}
    expiration: ${JWT_EXPIRATION:86400000}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200,http://localhost:3000}

  db:
    # Request queue configuration
    request-queue-size: 1000
    request-queue-timeout-seconds: 30

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.bid.auction: ${COM_BID_AUCTION_LOG_LEVEL:INFO}
    org.springframework.security: INFO
    com.zaxxer.hikari: DEBUG
    org.hibernate.SQL: INFO

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized



